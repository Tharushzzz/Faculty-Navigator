<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Faculty Navigator</title>
</head>
<body>
    <main>
        <header class="header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin w-8 h-8 text-blue-600" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <h1>Faculty Navigator</h1>
        </header>

        <div class="textbox">
            <h2>Welcome to the Faculty Navigator</h2>
            <p>Welcome to the Faculty of Technology. Click the main entrance to proceed.</p>
        </div>

        <section class="imagebox">
            <img class="image" src="./images/maingate.jpg" alt="Main Entrance" usemap="#universitymap">

            <map name="universitymap">
                <area shape="rect" coords="58,216,325,400" href="" alt="Main Entrance">
                <area shape="rect" coords="332,216,588,400" href="lobby.html" alt="Main Entrance">

            </map>
        </section>

        <section class="bottombox">
            <h1>Enter Building</h1>
            <p>Go through the main doors to the lobby.Take Left to Computer Laboratory, Take Right to Faculty Canteen</p>
        </section>
        
    </main>
</body>
</html>
